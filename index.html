  <meta charset="utf-8">

  <title>Japon 2026 Lite</title>
  <style>
:root {
  --red: #bc002d;
  --navy: #10233f;
  --ink: #172033;
  --muted: #647084;
  --bg: #f7f3ed;
  --card: #fffefa;
  --line: #e7ded2;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: var(--ink);
  background: var(--bg);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: radial-gradient(circle at 85% 4%, #bc002d18 0 70px, transparent 72px), var(--bg);
}

.app {
  max-width: 980px;
  margin: auto;
  min-height: 100vh;
  padding-bottom: 88px;
}

header {
  background: linear-gradient(135deg, var(--navy), #19395f);
  color: white;
  padding: 22px 18px;
  border-radius: 0 0 28px 28px;
}

h1, h2, h3 { margin: .2rem 0; }
p { line-height: 1.45; }

.eyebrow,
.muted {
  color: var(--muted);
  font-size: .86rem;
}

.hero small {
  color: #ffd6df;
  letter-spacing: .1em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.card,
.filter,
.day,
.restaurant {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 8px 24px #10233f0d;
}

.stat b {
  display: block;
  font-size: 1.5rem;
  color: var(--red);
}

main { padding: 16px; }
.section { display: none; }
.section.active { display: block; }
.hidden { display: none; }

.filters {
  display: grid;
  gap: 10px;
  margin: 12px 0;
}

.filters select,
.filters input,
.filters button,
textarea {
  width: 100%;
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: white;
  font: inherit;
}

.cards {
  display: grid;
  gap: 12px;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 8px 0;
}

.badge {
  background: #f1e8dc;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px 8px;
  font-size: .78rem;
}

.warn { background: #fff1c2; color: #6f4b00; }
.ok { background: #e9f7ef; color: #17603a; }

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.actions button,
.link,
.reset {
  border: 0;
  border-radius: 12px;
  background: var(--navy);
  color: white;
  padding: 10px 12px;
  text-decoration: none;
  font: inherit;
}

.ghost {
  background: #f2f4f8 !important;
  color: var(--navy) !important;
}

.fav.on {
  background: var(--red);
  color: white;
}

.tabs {
  display: flex;
  gap: 8px;
  overflow: auto;
  margin: 12px 0;
}

.tabs button {
  border: 1px solid var(--line);
  background: white;
  border-radius: 999px;
  padding: 9px 12px;
  white-space: nowrap;
}

.tabs button.active {
  background: var(--navy);
  color: white;
}

.budgetbar {
  height: 14px;
  background: #eadfd4;
  border-radius: 999px;
  overflow: hidden;
}

.budgetbar i {
  display: block;
  height: 100%;
  background: var(--red);
}

nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(980px, 100%);
  height: 72px;
  background: white;
  border-top: 1px solid var(--line);
  display: flex;
  z-index: 3;
}

nav button {
  flex: 1;
  border: 0;
  background: white;
  color: var(--muted);
  font-size: .75rem;
}

nav button.active {
  color: var(--red);
  font-weight: 700;
}

.count {
  font-weight: 700;
  color: var(--red);
}

@media (min-width: 760px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
  .filters { grid-template-columns: repeat(5, 1fr); }
  .cards { grid-template-columns: repeat(2, 1fr); }
  header {
    margin-top: 12px;
    border-radius: 28px;
  }
}

/* Planning interactif, géographie et budget flexible */
.tool-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
.tool-row > * { flex: 1 1 150px; }
.slot-grid { display: grid; gap: 12px; }
.slot { border: 1px dashed #cbbfaf; border-radius: 18px; padding: 12px; background: #fffaf2; min-height: 120px; }
.slot.drag-over { outline: 3px solid #bc002d55; }
.schedule-item { border: 1px solid var(--line); border-radius: 14px; padding: 10px; margin: 8px 0; background: white; }
.schedule-item.done { opacity: .72; border-color: #8ac7a0; }
.inline-form { display: grid; gap: 8px; margin-top: 10px; }
.inline-form select,
.inline-form input,
.inline-form textarea,
.tool-row select,
.tool-row input,
.tool-row button { padding: 10px; border: 1px solid var(--line); border-radius: 12px; font: inherit; background: white; }
.area-grid { display: grid; gap: 8px; margin-top: 10px; }
.budgetbar.warn i { background: #d58a00; }
.budgetbar.over i { background: var(--red); }
.over-text { color: var(--red); font-weight: 700; }
.source-picker { max-height: 220px; overflow: auto; }
.source-picker button { width: 100%; text-align: left; margin: 4px 0; }
@media (min-width: 760px) { .slot-grid { grid-template-columns: repeat(5, 1fr); } .area-grid { grid-template-columns: 1fr 1fr auto; } }

  </style>

function defaultState() {
  return {

    }

}

function migrateState(rawState) {
  const defaults = defaultState();
  const migrated = { ...defaults, ...(rawState || {}) };
  migrated.favorites = Array.isArray(migrated.favorites) ? migrated.favorites : [];
  migrated.visited = Array.isArray(migrated.visited) ? migrated.visited : [];
  migrated.notes = migrated.notes && typeof migrated.notes === 'object' ? migrated.notes : {};
  migrated.doneActivities = Array.isArray(migrated.doneActivities) ? migrated.doneActivities : [];
  migrated.dailyExpenses = Array.isArray(migrated.dailyExpenses) ? migrated.dailyExpenses : [];
  migrated.scheduleItems = Array.isArray(migrated.scheduleItems) ? migrated.scheduleItems : [];
  migrated.areaOverrides = migrated.areaOverrides && typeof migrated.areaOverrides === 'object' ? migrated.areaOverrides : {};
  migrated.budgetSettings = {
    globalBudget: Number(migrated.budgetSettings?.globalBudget ?? APP_SEED_DATA.metadata.budgetInitial),
    alreadyPaid: Number(migrated.budgetSettings?.alreadyPaid ?? APP_SEED_DATA.metadata.totalPaid)
  };

  if (!migrated.scheduleMigrated) {
    migrated.scheduleItems = [
      ...migrated.scheduleItems,
      ...APP_SEED_DATA.planning.map((item, index) => ({
        id: 'schedule-seed-' + (item.id || index),
        sourceType: 'free',
        sourceId: item.id || '',
        fallbackLabel: item.activities || item.area || 'Élément importé',
        fallbackArea: item.area || '',
        date: item.date,
        slot: seedSlot(item),
        time: item.time && item.time !== 'Journée' ? item.time : '',
        note: [item.notes, item.price, item.reservation].filter(Boolean).join(' · '),
        completed: false,
        order: index
      }))
    ];
    migrated.scheduleMigrated = true;
  }

  migrated.version = 2;
  return migrated;
}

function normalizeText(value) {
  return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[\s_‐‑‒–—-]+/g, ' ').trim();
}

function getField(item, camel, snake) {
  return item?.[camel] ?? item?.[snake] ?? '';
}

function getRestaurantStation(restaurant) { return getField(restaurant, 'nearestStation', 'nearest_station'); }
function getCityOrWard(item) { return getField(item, 'cityOrWard', 'city_or_ward'); }
function getExactArea(item) { return getField(item, 'neighborhood', 'neighborhood') || getField(item, 'exactArea', 'exact_area'); }
function getAddress(item) { return item?.address || ''; }

function zoneForDisplayArea(displayArea) {
  return Object.entries(TOURIST_ZONES).find(([, areas]) => areas.includes(displayArea))?.[0] || 'À classer';
}

function matchKnownArea(...parts) {
  const text = normalizeText(parts.filter(Boolean).join(' '));
  if (!text) return '';
  for (const [area, aliases] of Object.entries(AREA_ALIASES)) {
    if ([area, ...aliases].some((alias) => text.includes(normalizeText(alias)))) return area;
  }
  return '';
}

function resolveGeographicArea(item, type = item?.sourceType || 'activity') {
  const id = item?.id || item?.sourceId || '';
  const override = state.areaOverrides[sourceKey(type, id)] || state.areaOverrides[id];
  if (override) {
    return { zone: override.zone, displayArea: override.displayArea, exactArea: '', nearestStation: '', cityOrWard: '', address: '', overridden: true };
  }

  const station = type === 'restaurant' ? getRestaurantStation(item) : '';
  const exactArea = getExactArea(item);
  const cityOrWard = getCityOrWard(item);
  const address = getAddress(item);
  const displayArea = matchKnownArea(item?.area, station, exactArea, cityOrWard, address) || 'À classer';
  return {
    zone: zoneForDisplayArea(displayArea),
    displayArea,
    exactArea,
    nearestStation: station,
    cityOrWard,
    address,
    overridden: false
  };
}

function zoneOptions(selected = '') {

function areaOptions(zone, selected = '') {

}

// Gestion du planning
function tripDates() {
  const dates = [];
  const start = new Date(APP_SEED_DATA.metadata.tripStart + 'T00:00:00');
  const end = new Date(APP_SEED_DATA.metadata.tripEnd + 'T00:00:00');
  for (const day = new Date(start); day <= end; day.setDate(day.getDate() + 1)) dates.push(day.toISOString().slice(0, 10));
  return dates;
}

function seedSlot(item) {
  const text = normalizeText([item?.time, item?.activities, item?.notes].join(' '));
  if (text.includes('diner') || text.includes('soir')) return 'dinner';
  if (text.includes('dejeuner') || text.includes('lunch')) return 'lunch';
  if (text.includes('14h') || text.includes('apres')) return 'afternoon';
  return 'morning';
}

function sourceLabel(type, id, fallback = '') {
  const maps = sourceMaps();
  const source = maps[type]?.[id];
  if (!source) return fallback || 'Élément supprimé';
  return type === 'restaurant' ? (source.nameRomaji || source.nameJa) : source.name;
}

function sourceGeo(type, id, fallbackArea = '') {
  const maps = sourceMaps();
  const source = maps[type]?.[id];
  if (!source) return { zone: 'À classer', displayArea: fallbackArea || 'À classer', nearestStation: '', exactArea: '' };
  return resolveGeographicArea(source, type);
}

function scheduleForDate(date) {
  return state.scheduleItems.filter((item) => item.date === date).sort((a, b) => (a.order || 0) - (b.order || 0));
}

function addToSchedule(type, id, prefix = '') {
  const date = $('#' + prefix + 'Date')?.value || selectedDate;
  const slot = $('#' + prefix + 'Slot')?.value || 'morning';
  const time = $('#' + prefix + 'Time')?.value || '';
  const note = $('#' + prefix + 'Note')?.value || '';
  const item = {
    id: 'schedule-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    sourceType: type,
    sourceId: id,
    fallbackLabel: sourceLabel(type, id),
    fallbackArea: sourceGeo(type, id).displayArea,
    date,
    slot,
    time,
    note,
    completed: false,
    order: nextOrder(date, slot)
  };
  state.scheduleItems.push(item);
  selectedDate = date;
  save();
  renderProgram();
  renderHome();
}

function addSelectedSourceToSchedule() {
  if (!selectedSource) return alert('Choisis d’abord une activité ou un restaurant.');
  addToSchedule(selectedSource.type, selectedSource.id, 'programAdd');
}

function nextOrder(date, slot) {
  return Math.max(-1, ...state.scheduleItems.filter((item) => item.date === date && item.slot === slot).map((item) => Number(item.order || 0))) + 1;
}

function moveScheduleItem(id, date, slot) {
  const item = state.scheduleItems.find((entry) => entry.id === id);
  if (!item) return;
  item.date = date;
  item.slot = slot;
  item.order = nextOrder(date, slot);
  save();
  selectedDate = date;
  renderProgram();
  renderHome();
}

function updateScheduleItem(id, field, value) {
  const item = state.scheduleItems.find((entry) => entry.id === id);
  if (!item) return;
  item[field] = field === 'completed' ? Boolean(value) : value;
  if (field === 'date') selectedDate = value;
  save();
  renderProgram();
  renderHome();
}

function removeScheduleItem(id) {
  state.scheduleItems = state.scheduleItems.filter((item) => item.id !== id);
  save();
  renderProgram();
  renderHome();
}

function reorderScheduleItem(id, direction) {
  const item = state.scheduleItems.find((entry) => entry.id === id);
  if (!item) return;
  const siblings = state.scheduleItems.filter((entry) => entry.date === item.date && entry.slot === item.slot).sort((a, b) => (a.order || 0) - (b.order || 0));
  const index = siblings.findIndex((entry) => entry.id === id);
  const other = siblings[index + direction];
  if (!other) return;
  [item.order, other.order] = [other.order || 0, item.order || 0];
  save();
  renderProgram();
}

      <button onclick="selectedDate='${selectedDate}';renderProgram()">Voir toute la journée</button>
    </div>
    <p><b>${dayItems.length}</b> élément(s) prévu(s) pour la journée.</p>
    <div class="card">
      <h3>Ajouter une activité ou un restaurant</h3>
      <div class="tool-row">
        <input id="programSearch" placeholder="Rechercher" oninput="renderSourcePicker()" aria-label="Recherche programme">
        <select id="programAddDate">${dates.map((date) => `<option ${date === selectedDate ? 'selected' : ''}>${date}</option>`).join('')}</select>
        <select id="programAddSlot">${SLOTS.map(([key, label]) => `<option value="${key}">${label}</option>`).join('')}</select>
        <input id="programAddTime" placeholder="Heure facultative" aria-label="Heure facultative">
        <input id="programAddNote" placeholder="Note facultative" aria-label="Note facultative">
        <button onclick="addSelectedSourceToSchedule()">Ajouter au programme</button>
      </div>
      <p>Source sélectionnée : <b id="selectedSourceLabel">${selectedSource ? esc(sourceLabel(selectedSource.type, selectedSource.id)) : 'Aucune'}</b></p>
      <div id="programResults" class="source-picker"></div>
    </div>
    <div class="slot-grid">
      ${SLOTS.map(([slot, label]) => `
        <section class="slot" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="onSlotDrop(event,'${selectedDate}','${slot}')">
          <h3>${label}</h3>
          ${dayItems.filter((item) => item.slot === slot).map(scheduleCard).join('') || '<p class="muted">Dépose ici ou ajoute via le formulaire.</p>'}
        </section>
      `).join('')}
    </div>
  `;
  renderSourcePicker();
}

function nextScheduleEvent() {
  return [...state.scheduleItems]
    .filter((item) => !item.completed)
    .sort((a, b) => (a.date + (a.time || '')).localeCompare(b.date + (b.time || '')))[0];
}

// Gestion du budget
function expenseTotal(person) {
  return state.dailyExpenses.filter((expense) => !person || expense.person === person).reduce((sum, expense) => sum + Number(expense.amount || 0), 0);
}

function budgetSummary() {
  const globalBudget = Number(state.budgetSettings.globalBudget || 0);
  const alreadyPaid = Number(state.budgetSettings.alreadyPaid || 0);
  const trackedExpenses = expenseTotal();
  const totalSpent = alreadyPaid + trackedExpenses;
  const remainingBudget = globalBudget - totalSpent;
  const usedPercentage = globalBudget > 0 ? totalSpent / globalBudget * 100 : 0;
  return { globalBudget, alreadyPaid, trackedExpenses, totalSpent, remainingBudget, usedPercentage };
}

function saveBudgetSettings() {
  state.budgetSettings.globalBudget = Number($('#globalBudget').value || 0);
  state.budgetSettings.alreadyPaid = Number($('#alreadyPaid').value || 0);
  save();
  renderMore();
  renderHome();
}

function addExpense() {
  const date = $('#expenseDate').value;
  const person = $('#expensePerson').value;
  const category = $('#expenseCategory').value.trim() || 'Dépense';
  const amount = Number($('#expenseAmount').value || 0);
  const note = $('#expenseNote').value.trim();
  if (!date || !person || !amount || amount < 0) return alert('Merci de renseigner une date, une personne et un montant positif.');
  state.dailyExpenses.push({ id: 'exp-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6), date, person, category, amount, note });
  save();
  renderMore();
  renderHome();
}

function updateExpense(id) {
  const expense = state.dailyExpenses.find((item) => item.id === id);
  if (!expense) return;
  expense.date = $('#exp-date-' + id).value;
  expense.person = $('#exp-person-' + id).value;
  expense.category = $('#exp-cat-' + id).value.trim() || 'Dépense';
  expense.amount = Number($('#exp-amount-' + id).value || 0);
  expense.note = $('#exp-note-' + id).value.trim();
  save();
  renderMore();
  renderHome();
}

function deleteExpense(id) {
  state.dailyExpenses = state.dailyExpenses.filter((expense) => expense.id !== id);
  save();
  renderMore();
  renderHome();
}

function exportExpensesExcel() {
  const rows = [
    ['Date', 'Personne', 'Catégorie', 'Montant EUR', 'Note'],
    ...state.dailyExpenses.map((expense) => [expense.date, expense.person, expense.category, expense.amount, expense.note || '']),
    ['TOTAL Matteo', '', '', expenseTotal('Matteo'), ''],
    ['TOTAL Serrine', '', '', expenseTotal('Serrine'), ''],
    ['TOTAL global', '', '', expenseTotal(), '']
  ];
  const table = '<table>' + rows.map((row) => '<tr>' + row.map((cell) => '<td>' + esc(cell) + '</td>').join('') + '</tr>').join('') + '</table>';
  const blob = new Blob(['\ufeff' + table], { type: 'application/vnd.ms-excel' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'depenses-japon-matteo-serrine.xls';
  link.click();
  URL.revokeObjectURL(url);
}

function renderBudgetProgress(summary) {
  const width = Math.min(100, Math.max(0, summary.usedPercentage));
  const stateClass = summary.usedPercentage > 100 ? 'over' : summary.usedPercentage >= 75 ? 'warn' : '';
  return `
    <div class="budgetbar ${stateClass}" aria-label="Budget consommé ${summary.usedPercentage.toFixed(1)}%"><i style="width:${width}%"></i></div>
    <p class="${summary.usedPercentage > 100 ? 'over-text' : ''}">
      ${summary.usedPercentage > 100 ? 'Budget dépassé de ' + fmt(Math.abs(summary.remainingBudget)) : 'Budget consommé : ' + summary.usedPercentage.toFixed(1) + '%'}
    </p>
  `;
}

function renderDailyBudget() {
  const dates = tripDates();
  return `
    <h3>Suivi quotidien Matteo / Serrine</h3>
    <div class="card">
      <div class="grid">
        <div class="stat"><span>Total Matteo</span><b>${fmt(expenseTotal('Matteo'))}</b></div>
        <div class="stat"><span>Total Serrine</span><b>${fmt(expenseTotal('Serrine'))}</b></div>
      </div>
      <div class="filters">
        <select id="expenseDate" aria-label="Date dépense">${dates.map((date) => `<option>${date}</option>`).join('')}</select>
        <select id="expensePerson" aria-label="Personne"><option>Matteo</option><option>Serrine</option></select>
        <input id="expenseCategory" placeholder="Catégorie" aria-label="Catégorie">
        <input id="expenseAmount" type="number" min="0" step="0.01" placeholder="Montant €" aria-label="Montant">
        <input id="expenseNote" placeholder="Note" aria-label="Note">
      </div>
      <div class="actions">
        <button onclick="addExpense()">Ajouter la dépense</button>
        <button class="ghost" onclick="exportExpensesExcel()">Exporter en Excel</button>
      </div>
    </div>
    <div class="cards">
      ${state.dailyExpenses.map((expense) => `
        <article class="card">
          <div class="inline-form">
            <label>Date <input id="exp-date-${esc(expense.id)}" value="${esc(expense.date)}"></label>
            <label>Personne <select id="exp-person-${esc(expense.id)}"><option ${expense.person === 'Matteo' ? 'selected' : ''}>Matteo</option><option ${expense.person === 'Serrine' ? 'selected' : ''}>Serrine</option></select></label>
            <label>Catégorie <input id="exp-cat-${esc(expense.id)}" value="${esc(expense.category)}"></label>
            <label>Montant <input id="exp-amount-${esc(expense.id)}" type="number" step="0.01" value="${esc(expense.amount)}"></label>
            <label>Note <input id="exp-note-${esc(expense.id)}" value="${esc(expense.note)}"></label>
          </div>
          <div class="actions"><button onclick="updateExpense('${esc(expense.id)}')">Modifier</button><button class="ghost" onclick="deleteExpense('${esc(expense.id)}')">Supprimer</button></div>
        </article>
      `).join('') || '<p class="muted">Aucune dépense saisie.</p>'}
    </div>
  `;
}

// Rendu des activités
function renderAddControls(type, id) {
  const prefix = type + '-' + id + '-';
  return `
    <div class="inline-form">
      <select id="${esc(prefix)}Date" aria-label="Date programme">${tripDates().map((date) => `<option ${date === selectedDate ? 'selected' : ''}>${date}</option>`).join('')}</select>
      <select id="${esc(prefix)}Slot" aria-label="Créneau programme">${SLOTS.map(([key, label]) => `<option value="${key}">${label}</option>`).join('')}</select>
      <input id="${esc(prefix)}Time" placeholder="Heure facultative" aria-label="Heure facultative">
      <input id="${esc(prefix)}Note" placeholder="Note facultative" aria-label="Note facultative">
      <button onclick="addToSchedule('${esc(type)}','${esc(id)}','${esc(prefix)}')">Ajouter au programme</button>
    </div>
  `;
}

function renderActivities() {
  const zone = $('#actZone')?.value || '';
  const displayArea = $('#actDisplayArea')?.value || '';
  const activities = APP_SEED_DATA.activities.filter((activity) => {
    const geo = resolveGeographicArea(activity, 'activity');
    return (!$('#actArea') || !$('#actArea').value || activity.area === $('#actArea').value) &&
      (!$('#actStatus').value || activity.status === $('#actStatus').value) &&
      (!$('#actPriority').value || activity.priority === $('#actPriority').value) &&
      (!$('#actDecision').value || activity.commonDecision === $('#actDecision').value) &&
      (!$('#actResa').value || activity.reservation === $('#actResa').value) &&
      (!zone || geo.zone === zone) &&
      (!displayArea || geo.displayArea === displayArea);
  });
  $('#actList').innerHTML = activities.map((activity) => {
    const geo = resolveGeographicArea(activity, 'activity');
    return `
      <article class="card">
        <h3>${esc(activity.name)}</h3>
        ${badges([geo.zone, geo.displayArea, activity.area, activity.status, activity.priority, activity.priceWarning ? 'Tarif à confirmer' : ''])}
        <p>${esc(activity.description || '')}</p>
        <p><b>Prix :</b> ${fmt(activity.priceEur)}<br><b>Matteo :</b> ${esc(activity.matteoOpinion)}<br><b>Conjointe :</b> ${esc(activity.partnerOpinion)}<br><b>Notes :</b> ${esc(activity.notes || '—')}</p>
        ${renderAddControls('activity', activity.id)}
        ${correctionForm('activity', activity)}
        <button class="ghost" onclick="toggleDone('${esc(activity.id)}')">${state.doneActivities.includes(activity.id) ? 'Terminée' : 'Marquer terminée'}</button>
      </article>
    `;
  }).join('');
  $('#actCount').textContent = activities.length;
}

function toggleDone(id) {
  state.doneActivities = state.doneActivities.includes(id) ? state.doneActivities.filter((item) => item !== id) : [...state.doneActivities, id];
  save();
  renderActivities();
}

// Rendu des restaurants
function renderRestaurants() {
  const minRating = Number($('#restMin').value || 0);
  const favoriteFilter = $('#restFav').value;
  const zone = $('#restZone')?.value || '';
  const displayArea = $('#restDisplayArea')?.value || '';
  const maxPrice = $('#restPrice').value ? Number($('#restPrice').value) : null;
  const restaurants = APP_SEED_DATA.restaurants.filter((restaurant) => {
    const geo = resolveGeographicArea(restaurant, 'restaurant');
    const hasPrice = restaurant.estimatedPriceJpy != null;
    return (!$('#restCat').value || (restaurant.categories || [restaurant.category]).includes($('#restCat').value)) &&
      (!$('#restArea').value || restaurant.area === $('#restArea').value) &&
      (!minRating || restaurant.rating >= minRating) &&
      (!favoriteFilter || (favoriteFilter === 'favoris' ? state.favorites.includes(restaurant.id) : state.visited.includes(restaurant.id))) &&
      (maxPrice == null || (hasPrice && Number(restaurant.estimatedPriceJpy) <= maxPrice)) &&
      (!zone || geo.zone === zone) &&
      (!displayArea || geo.displayArea === displayArea);
  });
  $('#restCount').textContent = restaurants.length;
  $('#restList').innerHTML = restaurants.map((restaurant) => {
    const geo = resolveGeographicArea(restaurant, 'restaurant');
    return `
      <article class="restaurant">
        <h3>${esc(restaurant.nameJa)}</h3>
        <p class="muted">${esc(restaurant.nameRomaji)}</p>
        ${badges([...(restaurant.categories || [restaurant.category]), geo.zone, geo.displayArea, geo.nearestStation, '★ ' + (restaurant.rating ?? '—') + ' (' + (restaurant.reviewCount ?? '—') + ')'])}
        <p><b>Prix :</b> midi ${esc(restaurant.lunchPrice || '—')} · soir ${esc(restaurant.dinnerPrice || '—')} · estimé ${jpy(restaurant.estimatedPriceJpy)}</p>
        <p><b>Spécialité :</b> ${esc(restaurant.specialty || '—')}<br>${esc(restaurant.description || '')}</p>
        <div class="actions">
          <button class="fav ${state.favorites.includes(restaurant.id) ? 'on' : ''}" onclick="tog('favorites','${esc(restaurant.id)}')">♥ Favori</button>
          <button class="ghost" onclick="tog('visited','${esc(restaurant.id)}')">${state.visited.includes(restaurant.id) ? 'Visité' : 'À visiter'}</button>
          <a class="link" href="${esc(restaurant.tabelogUrl || '#')}" target="_blank">Tabelog</a>
          ${restaurant.reservationUrl ? `<a class="link" href="${esc(restaurant.reservationUrl)}" target="_blank">Réserver</a>` : ''}
        </div>
        <textarea placeholder="Note personnelle" oninput="state.notes['${esc(restaurant.id)}']=this.value;save()">${esc(state.notes[restaurant.id] || '')}</textarea>
        ${renderAddControls('restaurant', restaurant.id)}
        ${correctionForm('restaurant', restaurant)}
      </article>
    `;
  }).join('');
}

function tog(key, id) {
  state[key] = state[key].includes(id) ? state[key].filter((item) => item !== id) : [...state[key], id];
  save();
  renderRestaurants();
}

function renderHome() {
  const summary = budgetSummary();
  const next = nextScheduleEvent();
  $('#home').innerHTML = `
    <div class="hero"><small>JAPON 2026</small><h2>Version Lite</h2><p>${APP_SEED_DATA.metadata.tripStart} → ${APP_SEED_DATA.metadata.tripEnd} · ${APP_SEED_DATA.metadata.days} jours</p></div>
    <div class="grid">
      <div class="card stat"><span>Budget global</span><b>${fmt(summary.globalBudget)}</b></div>
      <div class="card stat"><span>Total dépensé</span><b>${fmt(summary.totalSpent)}</b></div>
      <div class="card stat"><span>Reste disponible</span><b>${fmt(summary.remainingBudget)}</b></div>
      <div class="card stat"><span>Activités</span><b>${APP_SEED_DATA.activities.length}</b></div>
    </div>
    ${renderBudgetProgress(summary)}
    <h3>Alertes tarifs</h3>${badges(APP_SEED_DATA.metadata.dataWarnings.map((warning) => warning + ' · Tarif à confirmer'))}
    <h3>Prochain événement</h3><div class="card">${next ? esc(next.date + ' · ' + SLOT_LABELS[next.slot] + ' · ' + sourceLabel(next.sourceType, next.sourceId, next.fallbackLabel)) : 'À compléter'}</div>
    <h3>Prochaines tâches</h3><div class="cards">${APP_SEED_DATA.tasks.slice(0, 4).map(taskCard).join('')}</div>
  `;
}

function taskCard(task) {
  return `<article class="card">${badges([task.priority, task.owner, task.status])}<h3>${esc(task.title)}</h3><p>Échéance : ${esc(task.dueDate)}</p></article>`;
}

function renderMore() {
  const summary = budgetSummary();
  $('#more').innerHTML = `
    <h2>Budget et tâches</h2>
    <div class="card">
      <div class="filters">
        <label>Budget global du voyage <input id="globalBudget" type="number" step="0.01" value="${esc(summary.globalBudget)}"></label>
        <label>Dépenses déjà payées avant le suivi <input id="alreadyPaid" type="number" step="0.01" value="${esc(summary.alreadyPaid)}"></label>
      </div>
      <button onclick="saveBudgetSettings()">Enregistrer le budget</button>
      <p>Budget global : <b>${fmt(summary.globalBudget)}</b><br>Dépenses déjà payées : <b>${fmt(summary.alreadyPaid)}</b><br>Nouvelles dépenses : <b>${fmt(summary.trackedExpenses)}</b><br>Total dépensé : <b>${fmt(summary.totalSpent)}</b><br>Budget restant : <b>${fmt(summary.remainingBudget)}</b></p>
      ${renderBudgetProgress(summary)}
    </div>
    <h3>Dépenses initiales informatives</h3>
    <div class="cards">${APP_SEED_DATA.budget.map((budget) => `<article class="card"><h3>${esc(budget.label)}</h3>${badges(['Réservation ' + budget.reserved])}<p>Payé : ${fmt(budget.paid)} · Reste après paiement : ${fmt(budget.remainingAfter)}</p></article>`).join('')}</div>
    ${renderDailyBudget()}
    <h3>Tâches</h3><div class="cards">${APP_SEED_DATA.tasks.map(taskCard).join('')}</div>
    <div class="actions"><button class="ghost" onclick="copyHtmlFile()">Copier le fichier index.html</button><button class="ghost" onclick="showHtmlSourceBox()">Afficher le fichier à copier-coller</button></div>
    <textarea id="copySourceBox" class="hidden" rows="14" aria-label="Code complet de index.html à copier-coller"></textarea>
    <button id="reset" class="reset">Réinitialiser mes données locales</button>
  `;
  $('#reset').onclick = () => { if (confirm('Réinitialiser mes données locales ?')) { localStorage.removeItem('japanLiteLocal'); location.reload(); } };
}

function getCopyableHtml() { return '<!doctype html>\n' + HTML_SOURCE; }
function copyHtmlFile() {
  const text = getCopyableHtml();
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text).then(() => alert('Fichier index.html copié.')).catch(() => fallbackCopy(text));
  fallbackCopy(text);
}
function showHtmlSourceBox() { const box = $('#copySourceBox'); box.classList.remove('hidden'); box.value = getCopyableHtml(); box.focus(); box.select(); }
function fallbackCopy(text) { const area = document.createElement('textarea'); area.value = text; area.style.position = 'fixed'; area.style.opacity = '0'; document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove(); alert('Fichier index.html copié.'); }

function init() {
  document.body.innerHTML = `
    <div class="app">
      <header><small>日本 · voyage validé ergonomie</small><h1>Notre voyage au Japon</h1><p>Application Lite autonome, données intégrées.</p></header>
      <main>

        <section id="restaurants" class="section"><h2>Restaurants <span id="restCount" class="count"></span></h2><div class="filters"><select id="restZone" onchange="refreshGeoAreaFilter('restaurant');renderRestaurants()"></select><select id="restDisplayArea" onchange="renderRestaurants()"></select><select id="restCat"></select><select id="restArea"></select><select id="restFav"><option value="">Favori/visité</option><option value="favoris">Favoris</option><option value="visited">Visités</option></select><select id="restPrice"><option value="">Prix max</option><option value="2000">≤ 2 000 ¥</option><option value="8000">≤ 8 000 ¥</option><option value="15000">≤ 15 000 ¥</option><option value="25000">≤ 25 000 ¥</option></select><input id="restMin" type="number" min="0" max="5" step="0.1" placeholder="Note min"></div><div id="restList" class="cards"></div></section>
        <section id="more" class="section"></section>
      </main>
      <nav>${[['home','Accueil'],['program','Programme'],['activities','Activités'],['restaurants','Restaurants'],['more','Plus']].map((item) => `<button data-sec="${item[0]}" onclick="show('${item[0]}')">${item[1]}</button>`).join('')}</nav>
    </div>`;
  renderHome();
  renderProgram();
  renderMore();

  opt('actStatus', APP_SEED_DATA.activities.map((activity) => activity.status), 'Statut');
  opt('actPriority', APP_SEED_DATA.activities.map((activity) => activity.priority), 'Priorité');
  opt('actDecision', APP_SEED_DATA.activities.map((activity) => activity.commonDecision), 'Décision');
  opt('actResa', APP_SEED_DATA.activities.map((activity) => activity.reservation), 'Réservation');
  opt('restCat', APP_SEED_DATA.restaurants.flatMap((restaurant) => restaurant.categories || [restaurant.category]), 'Catégorie');
  opt('restArea', APP_SEED_DATA.restaurants.map((restaurant) => restaurant.area), 'Quartier source');
  $$('.filters select,.filters input').forEach((input) => input.addEventListener('input', () => { renderActivities(); renderRestaurants(); }));
  renderActivities();
  renderRestaurants();
  show(localStorage.getItem('japanLitePrefs') || 'home');
}

init();

  </script>
