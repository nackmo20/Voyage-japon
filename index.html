function init(){const d=APP_SEED_DATA,m=d.metadata; $('#home').innerHTML=`<div class="hero"><small>JAPON 2026</small><h2>Version Lite</h2><p>${m.tripStart} → ${m.tripEnd} · ${m.days} jours</p></div><div class="grid"><div class="card stat"><span>Budget</span><b>${fmt(m.budgetInitial)}</b></div><div class="card stat"><span>Payé</span><b>${fmt(m.totalPaid)}</b></div><div class="card stat"><span>Reste</span><b>${fmt(m.budgetRemaining)}</b></div><div class="card stat"><span>Activités</span><b>${d.activities.length}</b></div></div><h3>Alertes tarifs</h3>${badges(m.dataWarnings.map(x=>x+' · Tarif à confirmer'))}<h3>Prochain événement</h3><div class="card">${(d.planning[0]||{activities:'À compléter'}).activities}</div><h3>Prochaines tâches</h3><div class="cards">${d.tasks.slice(0,4).map(taskCard).join('')}</div>`;

function renderProgram(){let d=APP_SEED_DATA.planning; $('#program').innerHTML='<h2>Programme</h2><div class="tabs">'+d.map((p,i)=>`<button class="${i?'':'active'}" onclick="selDate('${p.date}',this)">${p.date}</button>`).join('')+'</div><div id="days"></div>'; selDate(d[0]?.date)}
function selDate(date,btn){if(btn){$$('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')} const items=APP_SEED_DATA.planning.filter(p=>!date||p.date===date); $('#days').innerHTML=items.map(p=>`<article class="day"><h3>${p.date} · ${p.area}</h3>${badges([p.time,p.status,p.reservation])}<p>${p.activities}</p><p><b>Prix :</b> ${p.price}<br><b>Notes :</b> ${p.notes}</p></article>`).join('')||'<p>Journée à compléter.</p>'}
function renderActivities(){let a=APP_SEED_DATA.activities.filter(x=>(!$('#actArea')||!$('#actArea').value||x.area===$('#actArea').value)&&(!$('#actStatus').value||x.status===$('#actStatus').value)&&(!$('#actPriority').value||x.priority===$('#actPriority').value)&&(!$('#actDecision').value||x.commonDecision===$('#actDecision').value)&&(!$('#actResa').value||x.reservation===$('#actResa').value)); $('#actList').innerHTML=a.map(x=>`<article class="card"><h3>${x.name}</h3>${badges([x.area,x.status,x.priority,x.commonDecision,x.reservation,x.priceWarning?'Tarif à confirmer':''])}<p>${x.description||''}</p><p><b>Prix :</b> ${fmt(x.priceEur)}<br><b>Matteo :</b> ${x.matteoOpinion}<br><b>Conjointe :</b> ${x.partnerOpinion}<br><b>Notes :</b> ${x.notes||'—'}</p><button class="ghost" onclick="toggleDone('${x.id}')">${state.doneActivities.includes(x.id)?'Terminée':'Marquer terminée'}</button></article>`).join(''); $('#actCount').textContent=a.length}
function toggleDone(id){state.doneActivities=state.doneActivities.includes(id)?state.doneActivities.filter(x=>x!==id):[...state.doneActivities,id];save();renderActivities()}
function renderRestaurants(){let min=Number($('#restMin').value||0), fav=$('#restFav').value; let r=APP_SEED_DATA.restaurants.filter(x=>(!$('#restCat').value||(x.categories||[x.category]).includes($('#restCat').value))&&(!$('#restArea').value||x.area===$('#restArea').value)&&(!min||x.rating>=min)&&(!fav||(fav==='favoris'?state.favorites.includes(x.id):state.visited.includes(x.id)))&&(!$('#restPrice').value||((x.estimatedPriceJpy||0)<=Number($('#restPrice').value)))); $('#restCount').textContent=r.length; $('#restList').innerHTML=r.map(x=>`<article class="restaurant"><h3>${x.nameJa}</h3><p class="muted">${x.nameRomaji}</p>${badges([...(x.categories||[x.category]),x.area,x.nearestStation,'★ '+x.rating+' ('+x.reviewCount+')'])}<p><b>Prix :</b> midi ${x.lunchPrice||'—'} · soir ${x.dinnerPrice||'—'} · estimé ${jpy(x.estimatedPriceJpy)}</p><p><b>Spécialité :</b> ${x.specialty||'—'}<br>${x.description}</p><div class="actions"><button class="fav ${state.favorites.includes(x.id)?'on':''}" onclick="tog('favorites','${x.id}')">♥ Favori</button><button class="ghost" onclick="tog('visited','${x.id}')">${state.visited.includes(x.id)?'Visité':'À visiter'}</button><a class="link" href="${x.tabelogUrl}" target="_blank">Tabelog</a>${x.reservationUrl?`<a class="link" href="${x.reservationUrl}" target="_blank">Réserver</a>`:''}</div><textarea placeholder="Note personnelle" oninput="state.notes['${x.id}']=this.value;save()">${state.notes[x.id]||''}</textarea></article>`).join('')}
function tog(k,id){state[k]=state[k].includes(id)?state[k].filter(x=>x!==id):[...state[k],id];save();renderRestaurants()}
function tripDates(){let a=[], start=new Date(APP_SEED_DATA.metadata.tripStart+'T00:00:00'), end=new Date(APP_SEED_DATA.metadata.tripEnd+'T00:00:00'); for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)) a.push(d.toISOString().slice(0,10)); return a}
function expenseTotal(person){return state.dailyExpenses.filter(e=>!person||e.person===person).reduce((sum,e)=>sum+Number(e.amount||0),0)}
function addExpense(){let date=$('#expenseDate').value, person=$('#expensePerson').value, category=$('#expenseCategory').value.trim()||'Dépense', amount=Number($('#expenseAmount').value||0), note=$('#expenseNote').value.trim(); if(!date||!person||!amount||amount<0){alert('Merci de renseigner une date, une personne et un montant positif.');return} state.dailyExpenses.push({id:'exp-'+Date.now(),date,person,category,amount,note}); save(); renderMore()}
function deleteExpense(id){state.dailyExpenses=state.dailyExpenses.filter(e=>e.id!==id); save(); renderMore()}
function exportExpensesExcel(){let rows=[['Date','Personne','Catégorie','Montant EUR','Note'],...state.dailyExpenses.map(e=>[e.date,e.person,e.category,e.amount,e.note||'']),['TOTAL Matteo','','',expenseTotal('Matteo'),''],['TOTAL Serrine','','',expenseTotal('Serrine'),''],['TOTAL global','','',expenseTotal(),'']]; let table='<table>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+String(c).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))+'</td>').join('')+'</tr>').join('')+'</table>'; let blob=new Blob(['\ufeff'+table],{type:'application/vnd.ms-excel'}), url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download='depenses-japon-matteo-serrine.xls'; a.click(); URL.revokeObjectURL(url)}
function renderDailyBudget(){let dates=tripDates(), byDate=dates.map(date=>({date,matteo:state.dailyExpenses.filter(e=>e.date===date&&e.person==='Matteo').reduce((s,e)=>s+Number(e.amount),0),serrine:state.dailyExpenses.filter(e=>e.date===date&&e.person==='Serrine').reduce((s,e)=>s+Number(e.amount),0)})); return `<h3>Suivi quotidien Matteo / Serrine</h3><div class="card"><div class="grid"><div class="stat"><span>Total Matteo</span><b>${fmt(expenseTotal('Matteo'))}</b></div><div class="stat"><span>Total Serrine</span><b>${fmt(expenseTotal('Serrine'))}</b></div></div><div class="filters"><select id="expenseDate">${dates.map(d=>`<option>${d}</option>`).join('')}</select><select id="expensePerson"><option>Matteo</option><option>Serrine</option></select><input id="expenseCategory" placeholder="Catégorie"><input id="expenseAmount" type="number" min="0" step="0.01" placeholder="Montant €"><input id="expenseNote" placeholder="Note"></div><div class="actions"><button onclick="addExpense()">Ajouter la dépense</button><button class="ghost" onclick="exportExpensesExcel()">Exporter en Excel</button></div></div><div class="cards">${byDate.map(d=>`<article class="card"><h3>${d.date}</h3>${badges(['Matteo '+fmt(d.matteo),'Serrine '+fmt(d.serrine),'Jour '+fmt(d.matteo+d.serrine)])}${state.dailyExpenses.filter(e=>e.date===d.date).map(e=>`<p><b>${e.person}</b> · ${fmt(e.amount)} · ${e.category}${e.note?' — '+e.note:''} <button class="ghost" onclick="deleteExpense('${e.id}')">Supprimer</button></p>`).join('')||'<p class="muted">Aucune dépense saisie.</p>'}</article>`).join('')}</div>`}
function taskCard(t){return `<article class="card">${badges([t.priority,t.owner,t.status])}<h3>${t.title}</h3><p>Échéance : ${t.dueDate}</p></article>`}
function renderMore(){let m=APP_SEED_DATA.metadata, paid=m.totalPaid/m.budgetInitial*100; $('#more').innerHTML=`<h2>Budget et tâches</h2><div class="card"><p>Cagnotte initiale : <b>${fmt(m.budgetInitial)}</b><br>Dépenses payées : <b>${fmt(m.totalPaid)}</b><br>Reste disponible : <b>${fmt(m.budgetRemaining)}</b></p><div class="budgetbar"><i style="width:${paid}%"></i></div></div><h3>Dépenses</h3><div class="cards">${APP_SEED_DATA.budget.map(b=>`<article class="card"><h3>${b.label}</h3>${badges(['Réservation '+b.reserved])}<p>Payé : ${fmt(b.paid)} · Reste après paiement : ${fmt(b.remainingAfter)}</p></article>`).join('')}</div>${renderDailyBudget()}<h3>Tâches</h3><div class="cards">${APP_SEED_DATA.tasks.map(taskCard).join('')}</div><button id="reset" class="reset">Réinitialiser mes données locales</button>`}
